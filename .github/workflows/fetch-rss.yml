name: Fetch RSS Articles

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-rss
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v6

      - name: Checkout notes repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/obsidian-notes
          token: ${{ secrets.PAT_NOTES_REPO }}
          path: notes-repo

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and process articles
        env:
          NOTES_REPO_PATH: notes-repo
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m scripts.fetch_rss

      - name: Show generated article changes
        working-directory: notes-repo
        run: |
          echo "Git status after RSS fetch:"
          git status --short
          echo "Input files:"
          find "A-🔴INPUTS/(C)-🟡RSS/Input" -maxdepth 1 -type f -name "*.md" | sort | tail -20

      - name: Commit and push to notes repo
        working-directory: notes-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "A-🔴INPUTS/(C)-🟡RSS/Input/"
          git add "A-🔴INPUTS/(C)-🟡RSS/.seen_urls.yml"
          if git diff --cached --quiet; then
            echo "No new articles"
          else
            git commit -m "feat: add RSS articles $(date +%Y-%m-%d)"
            git push origin HEAD:main
          fi
